<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank — Rebero</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #004ac6 0%, #2563eb 50%, #3b82f6 100%); }
        .gradient-text { background: linear-gradient(135deg, #004ac6, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body class="bg-[#f9f9ff] text-[#151c27] antialiased min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-[#e2e8f8]/50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="logo.png" alt="Rebero" class="h-8 sm:h-10">
            </a>
        </div>
    </nav>

    <!-- Thank You -->
    <main class="flex-1 flex items-center justify-center px-6">
        <div class="max-w-lg text-center py-24">
            <div class="w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-8">
                <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h1 class="text-3xl sm:text-4xl font-extrabold mb-4">Vielen Dank!</h1>
            <p class="text-lg text-[#434655] leading-relaxed mb-3">
                Ihr Platz in der Beta ist vorgemerkt.
            </p>
            <p class="text-base text-[#737686] leading-relaxed mb-10">
                Sobald der Beta-Zugang aktiviert wird, erhalten Sie eine E-Mail mit Ihren persönlichen Zugangsdaten.
            </p>
            <a href="/" class="inline-block gradient-bg text-white px-8 py-4 rounded-xl text-base font-semibold shadow-xl shadow-[#004ac6]/25 hover:shadow-2xl hover:-translate-y-0.5 transition-all">
                Zurück zur Startseite
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#151c27] text-white py-8">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="text-sm text-slate-500">&copy; 2026 Rebero. Alle Rechte vorbehalten. Server in Deutschland.</p>
        </div>
    </footer>

</body>
</html>
